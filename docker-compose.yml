services:
  telemt:
    image: whn0thacked/telemt-docker:3.3.38
    container_name: telemt
    restart: unless-stopped
    user: "root"
    environment:
      RUST_LOG: "info"
    command: ["/etc/telemt/telemt.toml"]
    volumes:
      - ./telemt:/etc/telemt/:rw
    security_opt:
      - no-new-privileges:true
    ports:
      - "443:443/tcp" # telegram
      - "9090:9090" # metrics
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=16m
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
